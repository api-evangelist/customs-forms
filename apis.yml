aid: customs-forms
name: Customs Forms
x-type: topic
description: >-
  Customs forms are the standardized declarations and supporting
  documents that importers, exporters, and carriers must complete to
  move goods across international borders. Common forms include the
  CBP Form 7501 (Entry Summary), CBP Form 3461 (Entry/Immediate
  Delivery), commercial invoice, packing list, certificate of origin
  (USMCA, GSP, etc.), CN22 / CN23 international postal customs
  declarations, the EU Single Administrative Document (SAD), and
  shipper export declarations. Many forms are now filed electronically
  through national customs computer systems (ACE, CDS, ICS2, NACCS),
  while postal and parcel carriers (UPS, FedEx, DHL, USPS) expose
  shipping APIs that generate the customs paperwork on behalf of
  shippers.
